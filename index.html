<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRUSTIK | Маркетплейс</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Стили для иконок в табах — чтобы красиво стояли рядом с текстом */
        .tab-icon {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            vertical-align: middle;
            display: inline-block;
        }
        .tab {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        /* Если нужно, чтобы текст не смещался при загрузке картинок */
        .tab img {
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <header class="shop-header">
        <div class="logo-small">HRUSTIK<span>.</span></div>
        
        <div class="search-container">
            <div class="search-bar">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M11 19C15.4183 19 19 15.4183 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19Z" stroke="#999999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M21 21L16.65 16.65" stroke="#999999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <input type="text" placeholder="Поиск" id="global-search">
            </div>
        </div>

        <div class="user-actions" id="auth-section">
            <a href="welcome.html" class="btn-home">Главная страница</a>
            <div id="user-display">
                <a href="auth.html" class="btn-login-round">Войти</a>
            </div>
        </div>
    </header>

    <nav class="tabs-container">
        <div class="tabs-scroll">
            <a href="#" class="tab active">Главная</a>
            <a href="#" class="tab">
                <img src="money.png" alt="Донат" class="tab-icon"> Донат
            </a>
            <a href="#" class="tab">
                <img src="accounts.png" alt="Аккаунты" class="tab-icon"> Аккаунты
            </a>
            <a href="#" class="tab">
                <img src="subscriptions.png" alt="Подписки" class="tab-icon"> Подписки
            </a>
            <a href="#" class="tab">
                <img src="items.png" alt="Предметы" class="tab-icon"> Предметы
            </a>
            <a href="#" class="tab">
                <img src="skins.png" alt="Скины" class="tab-icon"> Скины
            </a>
            <a href="#" class="tab">
                <img src="steam.png" alt="Steam" class="tab-icon"> Steam
            </a>
        </div>
    </nav>

    <main class="content">
        <h2 class="category-title">Популярное сегодня</h2>
        
        <div class="product-grid">
            <div class="product-card">
                <div class="card-date">Дата создания: 20.04.2026</div>
                <div class="card-img-wrapper">
                    <img src="100.png" alt="Товар">
                </div>
                <div class="card-info">
                    <div class="card-price">1 500 Хрустиков</div>
                    <div class="card-title">Набор валюты "Золотой Хруст"</div>
                </div>
            </div>
        </div>
    </main>

    <script src="index_logic.js"></script>
    <script>
        // Твоя логика первого визита
        if (!localStorage.getItem('hrustik_user_visited')) {
            localStorage.setItem('hrustik_user_visited', 'true');
            window.location.href = 'welcome.html';
        }
    </script>
</body>
</html>
