<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRUSTIK | Авторизация</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth_style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="auth-card">
        <div id="step-email" class="step active">
            <h2>Войти</h2>
            <p>Введите почту для получения кода</p>
            <div class="input-group">
                <input type="email" id="email-input" placeholder="example@mail.com" autocomplete="email">
                <span class="error-text" id="email-error" style="display: none;">Некорректная почта</span>
            </div>
            <button class="btn-blue" id="btn-continue">Продолжить</button>
            <div class="divider">или</div>
            <button class="btn-google" id="btn-google">
                <img src="google.png" alt="G"> Войти через Google
            </button>
        </div>

        <div id="step-otp" class="step">
            <h2>Код подтверждения</h2>
            <p id="otp-message">6 цифр отправлены на вашу почту</p>
            <div class="otp-inputs">
                <input type="text" maxlength="1" inputmode="numeric" class="otp-field">
                <input type="text" maxlength="1" inputmode="numeric" class="otp-field">
                <input type="text" maxlength="1" inputmode="numeric" class="otp-field">
                <input type="text" maxlength="1" inputmode="numeric" class="otp-field">
                <input type="text" maxlength="1" inputmode="numeric" class="otp-field">
                <input type="text" maxlength="1" inputmode="numeric" class="otp-field">
            </div>
            <button class="btn-blue" id="btn-verify-otp">Продолжить</button>
        </div>

        <div id="step-register" class="step">
            <h2>Почти готово</h2>
            <p>Заполните данные вашего профиля</p>
            <div class="input-group">
                <input type="text" id="reg-name" placeholder="Ваше имя" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="text" id="reg-birth" placeholder="Дата рождения (ДД.ММ.ГГГГ)" inputmode="numeric" maxlength="10" autocomplete="off">
            </div>
            <button class="btn-blue" id="btn-finish-reg">Завершить</button>
        </div>
    </div>

    <script src="auth_logic.js"></script>
</body>
</html>
