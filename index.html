<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRUSTIK | Маркетплейс</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="shop-header">
        <div class="logo-small">HRUSTIK<span>.</span></div>
        <nav class="tabs-container">
            <div class="tabs-scroll">
                <a href="#" class="tab active">Главная</a>
                <a href="#" class="tab">Roblox</a>
                <a href="#" class="tab">Brawl Stars</a>
                <a href="#" class="tab">Steam</a>
                <a href="#" class="tab">PUBG</a>
                <a href="#" class="tab">Minecraft</a>
            </div>
        </nav>
        <div class="user-actions">
            <a href="auth.html" class="btn-login-round">Войти</a>
        </div>
    </header>

    <main class="content">
        <h2 class="category-title">Популярное сегодня</h2>
        
        <div class="product-grid">
            
            <div class="product-card" onclick="location.href='item.html'">
                <div class="card-date">Дата создания: 20.04.2026</div>
                
                <div class="card-img-wrapper">
                    <img src="100.png" alt="Товар">
                </div>
                
                <div class="card-info">
                    <div class="card-price">1 500 Хрустиков</div>
                    <div class="card-title">Набор валюты "Золотой Хруст"</div>
                </div>
            </div>

            <div class="product-card">
                <div class="card-date">Дата создания: 19.04.2026</div>
                <div class="card-img-wrapper">
                    <img src="100.png" alt="Товар">
                </div>
                <div class="card-info">
                    <div class="card-price">2 900 Хрустиков</div>
                    <div class="card-title">Аккаунт с редкими скинами</div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Проверка: если зашел первый раз — кидаем на welcome.html
        if (!localStorage.getItem('hrustik_user_visited')) {
            localStorage.setItem('hrustik_user_visited', 'true');
            window.location.href = 'welcome.html';
        }
    </script>
</body>
</html>
