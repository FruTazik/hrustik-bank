<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HRUSTIK | Авторизация</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth_style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card" id="auth-card">
            
            <div id="step-email" class="step active">
                <h2>Войти в аккаунт</h2>
                <p>Введите почту, чтобы продолжить</p>
                
                <div class="input-group">
                    <input type="email" id="email-input" placeholder="example@mail.com">
                    <span class="error-text" id="email-error">Некорректный email</span>
                </div>

                <button class="btn-blue" onclick="checkEmail()">Продолжить</button>
                <div class="divider">или</div>
                <button class="btn-google" onclick="signInWithGoogle()">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" alt="G">
                    Войти через Google
                </button>
            </div>

            <div id="step-register" class="step">
                <h2>Создать профиль</h2>
                <div class="input-group">
                    <input type="text" id="reg-name" placeholder="Ваше имя">
                    <span class="error-text">Введите имя</span>
                </div>
                <div class="input-group">
                    <input type="date" id="reg-birth">
                    <span class="error-text">Вам должно быть больше 7 лет</span>
                </div>
                <div class="input-group">
                    <input type="password" id="reg-pass" placeholder="Пароль">
                    <span class="error-text">Минимум 6 символов</span>
                </div>
                <button class="btn-blue" onclick="startRegistration()">Принять</button>
            </div>

            <div id="step-otp" class="step">
                <h2>Подтвердите почту</h2>
                <p id="otp-message">Мы отправили код на почту ...</p>
                <div class="otp-inputs">
                    <input type="text" maxlength="1" class="otp-field">
                    <input type="text" maxlength="1" class="otp-field">
                    <input type="text" maxlength="1" class="otp-field">
                    <input type="text" maxlength="1" class="otp-field">
                    <input type="text" maxlength="1" class="otp-field">
                    <input type="text" maxlength="1" class="otp-field">
                </div>
                <button class="btn-blue" onclick="verifyOTP()">Войти</button>
            </div>

        </div>
    </div>

    <script src="auth_logic.js"></script>
</body>
</html>
